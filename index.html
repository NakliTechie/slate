/* ui/layout.css */
/* ── App root ──────────────────────────────────────────────────────────────── */

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

/* ── Compat warning ──────────────────────────────────────────────────────── */

#compat-warning {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: var(--space-5);
  text-align: center;
}

.compat-inner { max-width: 480px; }
.compat-inner h1 { font-size: 20px; margin: 0 0 var(--space-3); }
.compat-inner p { color: var(--fg-1); margin: 0 0 var(--space-4); }
.compat-inner ul { text-align: left; color: var(--fg-1); line-height: 2; }

/* ── Shell ─────────────────────────────────────────────────────────────────── */

#shell {
  display: flex;
  flex-direction: row;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── Toolbar (left sidebar) ───────────────────────────────────────────────── */

#toolbar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-1);
  width: 92px;
  padding: var(--space-2) 0;
  background: var(--bg-1);
  border-right: 1px solid var(--bg-2);
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-gutter: stable;
  z-index: 10;
}

#toolbar .toolbar-brand {
  position: sticky;
  top: calc(var(--space-2) * -1);
  margin: calc(var(--space-2) * -1) 0 var(--space-2);
  padding: var(--space-2) 0;
  width: 100%;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--fg-0);
  background: var(--bg-1);
  border-bottom: 1px solid var(--bg-2);
  z-index: 5;
  user-select: none;
}

#toolbar .toolbar-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-1);
  width: 100%;
  padding: 0 var(--space-1);
}

#toolbar .toolbar-group + .toolbar-group {
  border-top: 1px solid var(--bg-2);
  padding-top: var(--space-2);
  margin-top: var(--space-1);
}

#toolbar .btn-icon {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  color: var(--fg-1);
}

.dirty-dot {
  position: absolute;
  top: 3px;
  right: 3px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  pointer-events: none;
}

#toolbar .btn-icon:hover { color: var(--fg-0); }
#toolbar .btn-icon.active,
#toolbar .btn-icon[aria-pressed="true"] {
  background: var(--bg-2);
  color: var(--accent);
}



/* ── Right sidebar ────────────────────────────────────────────────────────── */

#right-sidebar {
  display: flex;
  flex-direction: column;
  width: 48px;
  padding: var(--space-2) 0;
  background: var(--bg-1);
  border-left: 1px solid var(--bg-2);
  flex-shrink: 0;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 10;
}

.rs-section-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-2);
  text-align: center;
  padding: var(--space-1) 0 2px;
  margin-top: var(--space-1);
}

.rs-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 0 var(--space-1);
}

.rs-btn-wrap {
  position: relative;
  display: flex;
  align-items: center;
  width: 36px;
}

.rs-btn {
  width: 36px;
  height: 36px;
  color: var(--fg-1);
}
.rs-btn:hover { color: var(--fg-0); }

.rs-star {
  position: absolute;
  top: 0;
  right: -2px;
  font-size: 8px;
  color: var(--warn);
  line-height: 1;
  pointer-events: none;
}

.rs-empty-hint {
  padding: var(--space-3) var(--space-1);
  text-align: center;
  font-size: 10px;
  color: var(--fg-2);
  line-height: 1.4;
}

/* ── Context bar (crop/tool commit) ──────────────────────────────────────── */

#context-bar {
  position: absolute;
  bottom: var(--space-4);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  background: var(--bg-1);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-md);
  padding: var(--space-2) var(--space-3);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  z-index: 30;
  white-space: nowrap;
}

#context-bar.hidden { display: none; }
#context-bar .ctx-divider { width: 1px; height: 16px; background: var(--bg-3); margin: 0 var(--space-1); }
#context-bar .ctx-hint { font-size: 11px; color: var(--fg-2); }
#context-bar .ctx-slider-wrap { display: flex; align-items: center; gap: var(--space-2); font-size: 12px; color: var(--fg-1); }
#context-bar .ctx-slider-wrap input[type=range] { width: 100px; }
#context-bar .ctx-slider-wrap output { min-width: 30px; text-align: right; color: var(--fg-2); font-size: 11px; }

/* ── Main area (right of toolbar) ─────────────────────────────────────────── */

#main-area {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
  min-width: 0;
}

/* ── Canvas row (rulers + viewport) ──────────────────────────────────────── */

#canvas-row {
  display: flex;
  flex-direction: row;
  flex: 1;
  overflow: hidden;
  min-height: 0;
  position: relative;
}

/* ── Rulers ───────────────────────────────────────────────────────────────── */

#ruler-corner {
  width: 24px;
  height: 24px;
  background: var(--ruler-bg);
  border-right: 1px solid var(--bg-2);
  border-bottom: 1px solid var(--bg-2);
  flex-shrink: 0;
  z-index: 5;
}

#ruler-h {
  height: 24px;
  background: var(--ruler-bg);
  border-bottom: 1px solid var(--bg-2);
  flex: 1;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

#ruler-v {
  width: 24px;
  background: var(--ruler-bg);
  border-right: 1px solid var(--bg-2);
  flex-shrink: 0;
  overflow: hidden;
  position: relative;
}

#rulers-row {
  display: flex;
  flex-direction: row;
  height: 24px;
  flex-shrink: 0;
}

.rulers-hidden #ruler-corner,
.rulers-hidden #ruler-h,
.rulers-hidden #ruler-v,
.rulers-hidden #rulers-row { display: none; }

/* ── Viewport ────────────────────────────────────────────────────────────── */

#viewport {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg-0);
  cursor: default;
}

#main-canvas {
  position: absolute;
  top: 0; left: 0;
  touch-action: none;
}

/* ── Thumbnail strip ──────────────────────────────────────────────────────── */

#thumbstrip-bar {
  height: 100px;
  background: var(--thumb-bg);
  border-top: 1px solid var(--bg-2);
  display: flex;
  flex-direction: row;
  align-items: center;
  overflow-x: auto;
  overflow-y: hidden;
  gap: var(--space-1);
  padding: var(--space-1) var(--space-2);
  flex-shrink: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--bg-3) transparent;
}

#thumbstrip-bar.hidden { display: none; }

.thumb-item {
  flex-shrink: 0;
  width: 80px;
  height: 80px;
  border-radius: var(--radius-sm);
  border: 2px solid transparent;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: var(--bg-2);
  transition: border-color var(--dur-micro) var(--ease);
}

.thumb-item:hover { border-color: var(--bg-3); }
.thumb-item.active { border-color: var(--thumb-active); }

.thumb-item canvas,
.thumb-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.thumb-item .thumb-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: #fff;
  font-size: 10px;
  padding: 2px 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: 0;
  transition: opacity var(--dur-micro) var(--ease);
}

.thumb-item:hover .thumb-label { opacity: 1; }

/* ── Status bar ───────────────────────────────────────────────────────────── */

#status-bar {
  height: 24px;
  background: var(--bg-1);
  border-top: 1px solid var(--bg-2);
  display: flex;
  align-items: center;
  padding: 0 var(--space-3);
  gap: var(--space-4);
  flex-shrink: 0;
  font-size: 11px;
  color: var(--fg-2);
  overflow: hidden;
}

#status-bar .status-item { white-space: nowrap; }
#status-bar .status-sep { color: var(--bg-3); }

/* ── Empty state ──────────────────────────────────────────────────────────── */

#empty-state {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-0);
  z-index: 20;
}

#empty-state.hidden { display: none; }

.dropzone {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-4);
  padding: var(--space-8);
  border: 2px dashed var(--bg-3);
  border-radius: var(--radius-lg);
  text-align: center;
  max-width: 440px;
  width: 100%;
  transition: border-color var(--dur-micro) var(--ease), background var(--dur-micro) var(--ease);
}

.dropzone.drag-over {
  border-color: var(--accent);
  background: var(--selection);
}

.dropzone-icon { color: var(--fg-2); margin-bottom: var(--space-2); }
.dropzone h2 { font-size: 18px; font-weight: 600; margin: 0; }
.dropzone p { color: var(--fg-1); margin: 0; font-size: 13px; }

.dropzone-actions {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  justify-content: center;
}

.dropzone-hint { color: var(--fg-2); font-size: 12px; margin-top: var(--space-2); }

/* ── Floating numeric panel ───────────────────────────────────────────────── */

#numeric-panel {
  position: absolute;
  background: var(--bg-1);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-md);
  padding: var(--space-3);
  min-width: 200px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 50;
  cursor: move;
  user-select: none;
}

#numeric-panel.hidden { display: none; }

.panel-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--fg-2);
  margin-bottom: var(--space-3);
}

.panel-fields {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: var(--space-2) var(--space-3);
  align-items: center;
}

.panel-fields label { font-size: 12px; color: var(--fg-1); }

.panel-fields input[type="number"] {
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  width: 80px;
  text-align: right;
}

.panel-readout {
  margin-top: var(--space-3);
  padding-top: var(--space-2);
  border-top: 1px solid var(--bg-2);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 11px;
  color: var(--fg-2);
  white-space: nowrap;
}

/* ── Toast notifications ─────────────────────────────────────────────────── */

#toasts {
  position: fixed;
  bottom: var(--space-5);
  right: var(--space-5);
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  z-index: 200;
  pointer-events: none;
}

.toast {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: var(--bg-2);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-md);
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  font-size: 13px;
  pointer-events: auto;
  animation: toast-in var(--dur-panel) var(--ease);
  max-width: 360px;
}

.toast.error { border-color: var(--danger); }
.toast.warn { border-color: var(--warn); }
.toast.ok { border-color: var(--ok); }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Loading overlay ─────────────────────────────────────────────────────── */

#loading-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent);
  z-index: 100;
  transform-origin: left;
  transition: transform 0.2s var(--ease);
}
#loading-bar.hidden { display: none; }

/* ── Inline banners ──────────────────────────────────────────────────────── */

.banner {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  font-size: 12px;
  flex-shrink: 0;
}

.banner-warn { background: color-mix(in srgb, var(--warn) 15%, transparent); color: var(--warn); }
.banner-info { background: color-mix(in srgb, var(--accent) 10%, transparent); color: var(--fg-1); }
.banner-close { margin-left: auto; cursor: pointer; opacity: 0.6; }
.banner-close:hover { opacity: 1; }

/* ── Workspace nudge ─────────────────────────────────────────────────────── */

.workspace-nudge {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  background: var(--bg-1);
  border: 1px solid var(--bg-2);
  border-radius: var(--radius);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
  font-size: 12px;
  max-width: 520px;
  z-index: 50;
  white-space: nowrap;
  animation: nudge-in 0.2s var(--ease);
}

@keyframes nudge-in {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.workspace-nudge-close {
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px;
  opacity: 0.5;
  color: var(--fg-1);
  margin-left: var(--space-1);
  display: flex;
  align-items: center;
}
.workspace-nudge-close:hover { opacity: 1; }

/* ── Help modal ──────────────────────────────────────────────────────────── */

.help-dialog {
  width: min(640px, 94vw);
  max-height: min(720px, 90dvh, 90vh);
  padding: 0;
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-md);
  background: var(--bg-1);
  color: var(--fg-0);
  overflow: hidden;
}
.help-dialog[open] {
  display: flex;
  flex-direction: column;
}
.help-dialog:not([open]) { display: none; }

.help-dialog::backdrop { background: rgba(0,0,0,0.6); }

@media (max-width: 600px) {
  .help-dialog {
    width: 100vw;
    max-width: 100vw;
    max-height: 100dvh;
    height: 100dvh;
    border-radius: 0;
    border: none;
  }
  .help-tabs {
    flex-wrap: nowrap !important;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    padding: var(--space-1) var(--space-2);
  }
  .help-tab-btn { flex-shrink: 0; }
  .help-header  { padding: var(--space-2) var(--space-3); }
  .help-body    { padding: var(--space-2) var(--space-3); }
  .help-footer  { padding: var(--space-2) var(--space-3); }
}

.help-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--bg-2);
  flex-shrink: 0;
}

.help-header h2 { margin: 0; font-size: 15px; font-weight: 600; }
.help-close { flex-shrink: 0; }

.help-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  padding: var(--space-2) var(--space-3);
  border-bottom: 1px solid var(--bg-2);
  flex-shrink: 0;
}

.help-tab-btn {
  background: none;
  border: none;
  padding: 4px 12px;
  font-size: 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--fg-1);
  white-space: nowrap;
  flex-shrink: 0;
}

.help-tab-btn:hover { background: var(--bg-2); color: var(--fg-0); }
.help-tab-btn.active { background: var(--accent); color: #fff; }

.help-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: var(--space-3) var(--space-4);
}

.help-section { margin-bottom: var(--space-4); }
.help-section h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-2); margin: 0 0 var(--space-2); }

.help-row { display: flex; gap: var(--space-3); padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--bg-2); align-items: baseline; flex-wrap: wrap; }
.help-row:last-child { border-bottom: none; }
.help-label { flex-shrink: 0; width: 140px; color: var(--fg-1); }
.help-desc { color: var(--fg-0); }

.help-p { font-size: 12px; color: var(--fg-1); margin: 4px 0; line-height: 1.6; }

.help-footer {
  flex-shrink: 0;
  padding: var(--space-2) var(--space-4);
  border-top: 1px solid var(--bg-2);
  text-align: right;
}
.help-footer-link {
  color: var(--accent);
  font-size: 12px;
  text-decoration: none;
}
.help-footer-link:hover { text-decoration: underline; }

.shortcut-table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
.shortcut-table td { padding: 4px 8px 4px 0; vertical-align: baseline; word-wrap: break-word; }
.shortcut-table td:last-child { color: var(--fg-1); }

.help-welcome { text-align: center; padding: var(--space-4) 0 var(--space-3); }
.help-welcome-logo { margin-bottom: var(--space-2); opacity: 0.7; }
.help-welcome-title { font-size: 22px; font-weight: 700; margin: 0 0 var(--space-2); }
.help-welcome-tagline { font-size: 13px; color: var(--fg-1); margin: 0 0 var(--space-4); line-height: 1.6; }

.help-welcome-features { display: flex; flex-direction: column; gap: var(--space-3); margin-bottom: var(--space-4); }
.help-feature-item { display: flex; gap: var(--space-3); align-items: flex-start; font-size: 12px; line-height: 1.5; }
.help-feature-icon { font-size: 18px; flex-shrink: 0; width: 28px; text-align: center; }
.help-feature-item strong { display: block; margin-bottom: 2px; color: var(--fg-0); }
.help-feature-item div { color: var(--fg-1); }

.help-welcome-hint { text-align: center; font-size: 11px; color: var(--fg-2); margin: 0; }

kbd {
  display: inline-block;
  padding: 1px 6px;
  font-size: 11px;
  font-family: var(--font-mono, monospace);
  background: var(--bg-2);
  border: 1px solid var(--bg-3);
  border-radius: 3px;
  white-space: nowrap;
}

/* ── Layers panel ────────────────────────────────────────────────────────── */

#layers-panel {
  position: absolute;
  top: 56px;
  right: 56px;
  width: 220px;
  max-height: calc(100vh - 180px);
  background: var(--bg-1);
  border: 1px solid var(--bg-2);
  border-radius: var(--radius-md);
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  z-index: 25;
  display: none;
  flex-direction: column;
  overflow: hidden;
  font-size: 12px;
}
#layers-panel.visible { display: flex; }

.lp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  border-bottom: 1px solid var(--bg-2);
  flex-shrink: 0;
}
.lp-title { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-2); }
.lp-count { font-size: 11px; color: var(--fg-2); }

.lp-body { flex: 1; overflow-y: auto; padding: var(--space-1); }

.lp-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 6px;
  border-radius: 4px;
  color: var(--fg-0);
}
.lp-row:hover { background: var(--bg-2); }

.lp-glyph {
  width: 18px; height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-2);
  border-radius: 3px;
  font-size: 11px;
  color: var(--fg-1);
  flex-shrink: 0;
}

.lp-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }

.lp-btn {
  width: 22px; height: 22px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--fg-2);
  border-radius: 3px;
  font-size: 11px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lp-btn:hover { background: var(--bg-3); color: var(--fg-0); }
.lp-del:hover { color: var(--warn); }

.lp-foot {
  padding: 6px 10px;
  border-top: 1px solid var(--bg-2);
  font-size: 10px;
  color: var(--fg-2);
  flex-shrink: 0;
}

/* Hide when fullscreen */
#app.fullscreen #layers-panel,
#app.slideshow-active #layers-panel {
  display: none;
}

/* ── Batch dialog ────────────────────────────────────────────────────────── */

.batch-dialog {
  width: min(720px, 94vw);
  max-height: 90vh;
  padding: 0;
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-md);
  background: var(--bg-1);
  color: var(--fg-0);
  overflow: hidden;
}
.batch-dialog[open] {
  display: flex;
  flex-direction: column;
}
.batch-dialog:not([open]) { display: none; }
.batch-dialog::backdrop { background: rgba(0,0,0,0.6); }

.batch-body { flex: 1; overflow-y: auto; padding: var(--space-3) var(--space-4); }

.batch-section { margin-bottom: var(--space-4); }
.batch-section h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-2);
  margin: 0 0 var(--space-2);
}
.batch-section h4 {
  font-size: 12px;
  font-weight: 600;
  margin: var(--space-3) 0 var(--space-2);
}

.batch-source-line {
  font-size: 13px;
  color: var(--fg-1);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.batch-source-line strong { color: var(--fg-0); }

.btn-sm { font-size: 11px; padding: 3px 10px; }

.batch-op {
  border: 1px solid var(--bg-2);
  border-radius: 6px;
  padding: 8px 12px;
  margin-bottom: 6px;
  background: var(--bg-0);
}
.batch-op-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}
.batch-op-config {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
  margin-top: 6px;
  padding-left: 22px;
  font-size: 12px;
  color: var(--fg-1);
}
.batch-op-config input[type="number"],
.batch-op-config input[type="text"],
.batch-op-config select {
  background: var(--bg-1);
  border: 1px solid var(--bg-3);
  color: var(--fg-0);
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 12px;
}
.batch-inline { display: flex; align-items: center; gap: 6px; }

.batch-tokens { display: inline-flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.batch-tokens span {
  font-family: var(--font-mono, monospace);
  font-size: 10px;
  background: var(--bg-2);
  padding: 2px 6px;
  border-radius: 3px;
  cursor: pointer;
  color: var(--fg-1);
}
.batch-tokens span:hover { background: var(--bg-3); color: var(--fg-0); }

.batch-dest-opt {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 13px;
}
.batch-dest-opt.disabled { opacity: 0.4; pointer-events: none; }
.batch-dest-opt code { font-family: var(--font-mono, monospace); color: var(--fg-1); font-size: 11px; }
.batch-warn { color: var(--warn); font-size: 11px; margin-left: 4px; }

.batch-footer {
  display: flex;
  align-items: center;
  padding: var(--space-3) var(--space-4);
  border-top: 1px solid var(--bg-2);
  gap: 10px;
}
.batch-status { font-size: 11px; color: var(--fg-2); }
.batch-muted { color: var(--fg-2); font-weight: 400; font-size: 11px; }

.batch-dry-preview { margin-top: var(--space-3); padding-top: var(--space-3); border-top: 1px dashed var(--bg-3); }
.batch-warning {
  background: rgba(245,158,11,0.12);
  color: var(--warn);
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 11px;
  margin-bottom: 6px;
}
.batch-table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
.batch-table th { text-align: left; color: var(--fg-2); font-weight: 500; padding: 6px 4px; border-bottom: 1px solid var(--bg-2); }
.batch-table td { padding: 4px; border-bottom: 1px solid var(--bg-2); }
.batch-cell-trunc { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-mono, monospace); font-size: 10px; }

.batch-progress { padding: var(--space-3) 0; }
.batch-progress-bar {
  width: 100%;
  height: 10px;
  background: var(--bg-2);
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: var(--space-3);
}
.batch-progress-bar-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 200ms ease;
}
.batch-progress-text { font-size: 12px; color: var(--fg-1); font-family: var(--font-mono, monospace); }

.batch-summary { font-size: 14px; margin: 0 0 var(--space-3); }
.batch-errors { margin-top: var(--space-2); }
.batch-errors summary { font-size: 12px; color: var(--warn); cursor: pointer; }
.batch-error-row { font-size: 11px; color: var(--fg-1); padding: 4px 0; font-family: var(--font-mono, monospace); }

/* ── Slideshow ───────────────────────────────────────────────────────────── */

#app.slideshow-active #toolbar,
#app.slideshow-active #right-sidebar,
#app.slideshow-active #thumbstrip-bar,
#app.slideshow-active #status-bar,
#app.slideshow-active #rulers-row,
#app.slideshow-active #ruler-v,
#app.slideshow-active #workspace-nudge,
#app.slideshow-active #session-banner {
  display: none !important;
}
#app.slideshow-active #viewport { background: #000; }

#slideshow-hud {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2000;
  opacity: 0;
  transition: opacity 180ms ease;
}
#slideshow-hud.visible { opacity: 1; }

.ss-info {
  position: absolute;
  top: 24px;
  left: 24px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-family: var(--font-mono, monospace);
  display: flex;
  gap: 14px;
  align-items: baseline;
  max-width: 60vw;
  backdrop-filter: blur(8px);
  pointer-events: auto;
}
.ss-pos { color: rgba(255,255,255,0.7); }
.ss-name { color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.ss-controls {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  background: rgba(0,0,0,0.6);
  padding: 8px;
  border-radius: 10px;
  backdrop-filter: blur(8px);
  pointer-events: auto;
}
.ss-btn {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ss-btn:hover { background: rgba(255,255,255,0.15); }
.ss-btn .icon { width: 18px; height: 18px; }
.ss-btn[data-ss="prev"] .icon { transform: scaleX(-1); }
#slideshow-hud.paused .ss-play { background: var(--accent); }

/* ── Fullscreen mode ─────────────────────────────────────────────────────── */

#app.fullscreen #toolbar,
#app.fullscreen #right-sidebar,
#app.fullscreen #thumbstrip-bar,
#app.fullscreen #status-bar,
#app.fullscreen #rulers-row,
#app.fullscreen #ruler-corner,
#app.fullscreen #ruler-h,
#app.fullscreen #ruler-v {
  display: none;
}

#app.fullscreen #main-canvas { cursor: none; }
#app.fullscreen #viewport:hover #main-canvas { cursor: default; }

/* ── Mobile (< 768px) ─────────────────────────────────────────────────────── */

@media (max-width: 767px) {
  #shell { flex-direction: column; }

  #right-sidebar { display: none; }

  #toolbar .toolbar-brand { display: none; }

  #toolbar {
    order: 99; /* push to bottom of shell column */
    display: flex;
    flex-direction: row;
    width: 100%;
    height: 48px;
    padding: 0 var(--space-2);
    border-right: none;
    border-top: 1px solid var(--bg-2);
    border-bottom: none;
    overflow-x: auto;
    overflow-y: hidden;
  }

  #toolbar .toolbar-group {
    display: flex;
    flex-direction: row;
    gap: var(--space-1);
    width: auto;
    padding: 0;
  }

  #toolbar .toolbar-group + .toolbar-group {
    border-top: none;
    border-left: 1px solid var(--bg-2);
    padding-top: 0;
    padding-left: var(--space-2);
    margin-top: 0;
    margin-left: var(--space-1);
  }

  #thumbstrip-bar { height: 72px; }
  .thumb-item { width: 56px; height: 56px; }

  /* Numeric panel docks as bottom sheet on mobile */
  #numeric-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    border-bottom: none;
    min-width: unset;
    cursor: default;
  }
}

/* ── Modal field styles ──────────────────────────────────────────────────────── */

.modal-fields { display: flex; flex-direction: column; gap: var(--space-3); }
.modal-field-row { display: flex; align-items: center; gap: var(--space-3); min-height: 28px; }
.modal-field-row label { min-width: 90px; font-size: 12px; color: var(--fg-1); }
.modal-slider-wrap { display: flex; align-items: center; gap: var(--space-2); flex: 1; }
.modal-slider-wrap input[type="range"] { flex: 1; }
.modal-slider-wrap output { font-family: ui-monospace, monospace; font-size: 11px; color: var(--fg-1); min-width: 36px; text-align: right; }
.modal-unit { font-size: 11px; color: var(--fg-2); }
.modal-info { font-size: 11px; color: var(--fg-2); margin: var(--space-1) 0 0; }

.export-fmt-group { display: flex; flex-wrap: wrap; gap: var(--space-2); }
.export-fmt-option { display: flex; align-items: center; gap: var(--space-1); font-size: 12px; cursor: pointer; }

/* ── Info panel ───────────────────────────────────────────────────────────── */

#info-panel {
  position: absolute;
  top: var(--space-3);
  right: var(--space-3);
  background: var(--bg-1);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-md);
  padding: var(--space-3);
  min-width: 220px;
  max-width: 280px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  z-index: 40;
  font-size: 12px;
}

#info-panel.hidden { display: none; }

.info-row { display: flex; gap: var(--space-2); justify-content: space-between; padding: 2px 0; }
.info-label { color: var(--fg-2); flex-shrink: 0; }
.info-value { color: var(--fg-1); text-align: right; word-break: break-all; }
.info-gps-warn { color: var(--warn); margin-top: var(--space-2); font-size: 11px; }

/* ── Modal dialogs ────────────────────────────────────────────────────────── */

.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4); }
.modal-header h2 { margin: 0; font-size: 16px; }
.modal-footer { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-5); }

/* ── Pixel grid overlay (shown at zoom >= 400%) ───────────────────────────── */

#pixel-grid-canvas {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  opacity: 0.5;
}


/* ui/theme.css */
/* ── Color tokens ─────────────────────────────────────────────────────────── */

:root {
  color-scheme: dark light;

  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;

  /* Radius */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;

  /* Motion */
  --dur-micro:  120ms;
  --dur-panel:  200ms;
  --dur-modal:  300ms;
  --ease:       cubic-bezier(0.25, 0, 0.25, 1);
}

/* ── Dark theme (default) ───────────────────────────────────────────────── */

:root, [data-theme="dark"] {
  --bg-0: #111113;
  --bg-1: #18181b;
  --bg-2: #27272a;
  --bg-3: #3f3f46;

  --fg-0: #fafafa;
  --fg-1: #a1a1aa;
  --fg-2: #71717a;

  --accent:          #3b82f6;
  --accent-hover:    #2563eb;
  --accent-contrast: #ffffff;

  --danger: #ef4444;
  --warn:   #f59e0b;
  --ok:     #22c55e;

  --selection:        rgba(59, 130, 246, 0.35);
  --selection-border: #3b82f6;
  --selection-handle: #ffffff;

  --ruler-bg:    #18181b;
  --ruler-tick:  #52525b;
  --ruler-label: #71717a;

  --thumb-bg:       #18181b;
  --thumb-border:   #3f3f46;
  --thumb-active:   #3b82f6;

  --overlay-backdrop: rgba(0,0,0,0.6);
}

/* ── Light theme ─────────────────────────────────────────────────────────── */

[data-theme="light"] {
  --bg-0: #ffffff;
  --bg-1: #f4f4f5;
  --bg-2: #e4e4e7;
  --bg-3: #d4d4d8;

  --fg-0: #09090b;
  --fg-1: #52525b;
  --fg-2: #a1a1aa;

  --accent:          #2563eb;
  --accent-hover:    #1d4ed8;
  --accent-contrast: #ffffff;

  --danger: #dc2626;
  --warn:   #d97706;
  --ok:     #16a34a;

  --selection:        rgba(37, 99, 235, 0.25);
  --selection-border: #2563eb;
  --selection-handle: #1d4ed8;

  --ruler-bg:    #f4f4f5;
  --ruler-tick:  #a1a1aa;
  --ruler-label: #71717a;

  --thumb-bg:       #f4f4f5;
  --thumb-border:   #d4d4d8;
  --thumb-active:   #2563eb;

  --overlay-backdrop: rgba(0,0,0,0.4);
}

/* ── System preference auto-switch ──────────────────────────────────────── */

@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --bg-0: #ffffff;
    --bg-1: #f4f4f5;
    --bg-2: #e4e4e7;
    --bg-3: #d4d4d8;
    --fg-0: #09090b;
    --fg-1: #52525b;
    --fg-2: #a1a1aa;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --accent-contrast: #ffffff;
    --danger: #dc2626;
    --warn: #d97706;
    --ok: #16a34a;
    --selection: rgba(37, 99, 235, 0.25);
    --selection-border: #2563eb;
    --selection-handle: #1d4ed8;
    --ruler-bg: #f4f4f5;
    --ruler-tick: #a1a1aa;
    --ruler-label: #71717a;
    --thumb-bg: #f4f4f5;
    --thumb-border: #d4d4d8;
    --thumb-active: #2563eb;
    --overlay-backdrop: rgba(0,0,0,0.4);
  }
}

/* ── Reduced motion ──────────────────────────────────────────────────────── */

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ── Base resets ─────────────────────────────────────────────────────────── */

[hidden] { display: none !important; }

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  height: 100%;
  overflow: hidden;
  background: var(--bg-0);
  color: var(--fg-0);

  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

button {
  font: inherit;
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  color: inherit;
}

button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

input, select {
  font: inherit;
  color: inherit;
  background: var(--bg-2);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-sm);
  padding: var(--space-1) var(--space-2);
}

input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

dialog {
  background: var(--bg-1);
  color: var(--fg-0);
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  max-width: min(480px, 95vw);
  box-shadow: 0 24px 48px rgba(0,0,0,0.5);
}

dialog::backdrop { background: var(--overlay-backdrop); }

/* ── Utility classes ──────────────────────────────────────────────────────── */

.visually-hidden {
  position: absolute;
  width: 1px; height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
}

.icon {
  display: inline-block;
  width: 16px; height: 16px;
  flex-shrink: 0;
  fill: none;
  stroke: currentColor;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: none;
}

.icon-sm { width: 14px; height: 14px; }
.icon-lg { width: 20px; height: 20px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  transition: background var(--dur-micro) var(--ease), color var(--dur-micro) var(--ease);
  white-space: nowrap;
}

.btn:hover { background: var(--bg-2); }
.btn:active { background: var(--bg-3); }

.btn-primary {
  background: var(--accent);
  color: var(--accent-contrast);
}
.btn-primary:hover { background: var(--accent-hover); }

.btn-danger {
  background: var(--danger);
  color: #fff;
}

.btn-icon {
  padding: var(--space-2);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.btn-icon:hover { background: var(--bg-2); }
.btn-icon.active { background: var(--bg-2); color: var(--accent); }
.btn-icon[aria-pressed="true"] { background: var(--bg-2); color: var(--accent); }

.separator {
  width: 1px; height: 20px;
  background: var(--bg-3);
  align-self: center;
  flex-shrink: 0;
}
.separator-h {
  height: 1px; width: 100%;
  background: var(--bg-3);
  margin: var(--space-2) 0;
}

kbd {
  display: inline-block;
  padding: 1px 5px;
  border: 1px solid var(--bg-3);
  border-radius: var(--radius-sm);
  font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  font-size: 11px;
  background: var(--bg-2);
  color: var(--fg-1);
}

// ── Worker pool ──────────────────────────────────────────────────────────────

function makeWorkerPool(size) {

  const url = URL.createObjectURL(blob);
  const workers = Array.from({ length: size }, () => {
    const w = new Worker(url);
    w._pending = new Map();
    w.addEventListener('message', (e) => {
      const { id, blob, error } = e.data;
      const pending = w._pending.get(id);
      if (!pending) return;
      w._pending.delete(id);
      if (error) pending.reject(new Error(error));
      else pending.resolve(blob);
    });
    return w;
  });
  setTimeout(() => URL.revokeObjectURL(url), 5000);
  return workers;
}

function dispatchWorker(w, payload) {
  return new Promise((resolve, reject) => {
    const id = Math.random().toString(36).slice(2);
    w._pending.set(id, { resolve, reject });
    w.postMessage({ id, ...payload });
  });
}

// Worker script — inlined as a string so the single-file build stays single-file.
// Uses createImageBitmap + OffscreenCanvas + convertToBlob, all available in workers.
const WORKER_SRC = `
function rotateCanvas(src, deg) {
  const r = (deg % 360 + 360) % 360;
  const rad = r * Math.PI / 180;
  const sin = Math.abs(Math.sin(rad)), cos = Math.abs(Math.cos(rad));
  const w = Math.round(src.width * cos + src.height * sin);
  const h = Math.round(src.width * sin + src.height * cos);
  const out = new OffscreenCanvas(w, h);
  const ctx = out.getContext('2d');
  ctx.translate(w / 2, h / 2);
  ctx.rotate(rad);
  ctx.drawImage(src, -src.width / 2, -src.height / 2);
  return out;
}

function flipCanvas(src, axis) {
  const out = new OffscreenCanvas(src.width, src.height);
  const ctx = out.getContext('2d');
  if (axis === 'h') { ctx.translate(src.width, 0); ctx.scale(-1, 1); }
  else              { ctx.translate(0, src.height); ctx.scale(1, -1); }
  ctx.drawImage(src, 0, 0);
  return out;
}

function resizeCanvas(src, w, h) {
  const out = new OffscreenCanvas(w, h);
  const ctx = out.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(src, 0, 0, w, h);
  return out;
}

async function encode(canvas, outFmt, quality, exifRaw) {

  if (outFmt === 'webp') return canvas.convertToBlob({ type: 'image/webp', quality: quality / 100 });

  const flat = new OffscreenCanvas(canvas.width, canvas.height);
  const fctx = flat.getContext('2d');
  fctx.fillStyle = '#ffffff';
  fctx.fillRect(0, 0, flat.width, flat.height);

async function writeToDestination(dest, name, blob, src) {
  if (dest.mode === 'overwrite') {
    if (!src.handle) throw new Error('No file handle for overwrite');
    const w = await src.handle.createWritable();
    await w.write(blob); await w.close();
    return;

  let unique = name;
  let counter = 1;
  while (true) {
    try {
      await dest.folder.getFileHandle(unique);
      const dot = name.lastIndexOf('.');
      const base = dot >= 0 ? name.slice(0, dot) : name;
      const ext = dot >= 0 ? name.slice(dot) : '';
      unique = `${base}-${counter}${ext}`;
      counter++;
    } catch { break; }
  }
  const h = await dest.folder.getFileHandle(unique, { create: true });
  const w = await h.createWritable();
  await w.write(blob); await w.close();
}

async function resolveDestination() {
  if (_destMode === 'overwrite') return { mode: 'overwrite' };
  if (_destMode === 'subfolder') {
    if (!_sourceFolderHandle) throw new Error('No source folder to create subfolder in');
    const sub = await _sourceFolderHandle.getDirectoryHandle('batch-output', { create: true });
    return { mode: 'folder', folder: sub };

// ── Rename template ──────────────────────────────────────────────────────────

async function computeOutputName(src, index, exif, outFmt) {
  const ext = outFmt ? (outFmt === 'jpeg' ? 'jpg' : outFmt)
                     : src.name.slice((src.name.lastIndexOf('.') + 1) || src.name.length);
  const baseOriginal = src.name.replace(/\.[^.]+$/, '');

  // If rename disabled: keep original base, but use new ext if converting
  if (!ops.rename.enabled) return `${baseOriginal}.${ext}`;

  const templ = ops.rename.template || '{original}';
  const dateStr = (() => {
    const d = exif?.dateTimeOriginal;
    if (d && typeof d === 'string') {
      const m = d.match(/^(\d{4}).(\d{2}).(\d{2})/);
      if (m) return `${m[1]}-${m[2]}-${m[3]}`;
    }
    // fallback: file.lastModified
    try {
      const ts = src.file?.lastModified ?? Date.now();
      const dt = new Date(ts);
      return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
    } catch { return ''; }
  })();
  const cam = [exif?.make, exif?.model].filter(Boolean).join(' ').trim();

  const safe = (s) => String(s ?? '').replace(/[<>:"/\\|?*\x00-\x1f]/g, '_');

  const name = templ
    .replace(/\{original\}/g, safe(baseOriginal))
    .replace(/\{index\}/g, String(index + 1))
    .replace(/\{counter:(\d+)\}/g, (_, n) => String(index + 1).padStart(+n, '0'))
    .replace(/\{date\}/g, safe(dateStr))
    .replace(/\{camera\}/g, safe(cam))
    .replace(/\{w\}/g, '')  // filled during processOne if needed — skipped for dry-run simplicity
    .replace(/\{h\}/g, '');

  return `${name || baseOriginal}.${ext}`;
}

// ── Progress view & summary ──────────────────────────────────────────────────

function showProgressView(dlg) {
  dlg.innerHTML = `
    <div class="modal-header">
      <h2>Running batch</h2>
    </div>

function showSummary(dlg, results) {
  const errHtml = results.errors.length
    ? `<details class="batch-errors"><summary>${results.errors.length} error${results.errors.length===1?'':'s'}</summary>${results.errors.map(e => `<div class="batch-error-row"><strong>${esc(e.name)}</strong>: ${esc(e.message)}</div>`).join('')}</details>`
    : '';

    <div class="batch-body">
      <p class="batch-summary">

    </div>
    <div class="modal-footer batch-footer" style="justify-content:flex-end">

  dlg.querySelector('[data-batch="close-summary"]').addEventListener('click', () => dlg.close());
  if (results.ok > 0) emit('toast', { message: `Batch complete: ${results.ok} file${results.ok===1?'':'s'} saved.`, level: 'ok' });

// ── Helpers ──────────────────────────────────────────────────────────────────

function validateOpsEnabled(dlg) {
  const any = Object.values(ops).some(o => o.enabled);
  if (!any && !ops.convert.enabled) {
    dlg.querySelector('#batch-status').textContent = 'Enable at least one operation first.';
    return false;
  }
  if (_sources.length === 0) {
    dlg.querySelector('#batch-status').textContent = 'No images in source.';
    return false;
  }
  return true;
}

async function confirm(msg) {
  return window.confirm(msg);
}

function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }
function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / (1024 * 1024)).toFixed(1) + ' MB';
}

  // Rough: if converting to JPEG at 85%, ~50% of source; PNG typically bigger; WebP ~30%.
  if (ops.convert.enabled) {
    if (ops.convert.format === 'jpeg') return Math.round(srcSize * 0.55);
    if (ops.convert.format === 'webp') return Math.round(srcSize * 0.35);

  }

      <p class="modal-info">${count} image${count===1?'':'s'} in this album.</p>

      <span class="batch-status" id="gal-status"></span>

function bind(dlg) {
  dlg.querySelectorAll('[data-gal]').forEach(el => {
    el.addEventListener('click', () => {
      const a = el.dataset.gal;
      if (a === 'close') dlg.close();
      else if (a === 'go') run(dlg);
    });
  });
  dlg.querySelectorAll('input[name="gal-mode"]').forEach(r => r.addEventListener('change', e => {
    cfg.mode = e.target.value;
    dlg.querySelector('#gal-mode-gallery').style.display = cfg.mode === 'gallery' ? '' : 'none';
    dlg.querySelector('#gal-mode-sheet').style.display = cfg.mode === 'sheet' ? '' : 'none';
  }));
  dlg.querySelector('#gal-cols').addEventListener('change', e => { cfg.cols = Math.max(1, +e.target.value); });
  dlg.querySelector('#gal-size').addEventListener('change', e => { cfg.thumbSize = Math.max(80, +e.target.value); });
  dlg.querySelector('#gal-labels').addEventListener('change', e => { cfg.showLabels = e.target.checked; });
  dlg.querySelector('#gal-bg').addEventListener('change', e => { cfg.bg = e.target.value; });

// ── Run ──────────────────────────────────────────────────────────────────────

async function run(dlg) {
  const status = dlg.querySelector('#gal-status');
  const files = state.session.files;

  try {
    if (cfg.mode === 'gallery') {
      status.textContent = 'Rendering thumbnails…';
      const html = await buildGalleryHtml(files, (i, total) => {
        status.textContent = `Rendering ${i} / ${total}…`;
      });
      await saveArtifact(new Blob([html], { type: 'text/html' }), 'gallery.html');
    } else {
      status.textContent = 'Composing contact sheet…';
      const blob = await buildContactSheet(files, (i, total) => {
        status.textContent = `Placing ${i} / ${total}…`;
      });
      const ts = tstamp();
      const ext = cfg.sheetFormat === 'jpeg' ? 'jpg' : 'png';
      await saveArtifact(blob, `contact-sheet-${ts}.${ext}`);
    }
    dlg.close();
    emit('toast', { message: 'Done.', level: 'ok' });
  } catch (err) {
    status.textContent = '';
    emit('error', { message: `Gallery failed: ${err.message}` });
  }
}

async function saveArtifact(blob, name) {
  const dir = state.session.folderHandle;
  if (dir) {
    try {
      const fh = await dir.getFileHandle(name, { create: true });
      const w = await fh.createWritable();
      await w.write(blob);
      await w.close();
      return;
    } catch (err) {
      // Fall through to download
    }
  }
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// ── Gallery HTML build ───────────────────────────────────────────────────────

async function buildGalleryHtml(files, onProgress) {
  const items = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i].file ?? (files[i].handle ? await files[i].handle.getFile() : null);
    if (!file) continue;

    const bitmap = await createImageBitmap(file);
    const thumbDataUrl = await thumbToDataUrl(bitmap, cfg.thumbSize, 'image/webp', 0.82);
    let fullDataUrl = '';
    if (cfg.embedFull) {
      fullDataUrl = await blobToDataUrl(file);
    } else {
      fullDataUrl = esc(files[i].name);

    bitmap.close?.();
    items.push({
      name: files[i].name,
      thumb: thumbDataUrl,
      full: fullDataUrl,
      w: bitmap.width, h: bitmap.height

    onProgress(i + 1, files.length);
  }

  return htmlTemplate(items);
}

// ── Contact sheet build ──────────────────────────────────────────────────────

async function buildContactSheet(files, onProgress) {
  const cols = cfg.cols;
  const rows = Math.ceil(files.length / cols);
  const thumbW = cfg.thumbSize;
  const thumbH = Math.round(thumbW * 0.75); // 4:3 cell
  const labelH = cfg.showLabels ? 20 : 0;
  const pad = 8;
  const cellW = thumbW + pad;
  const cellH = thumbH + labelH + pad;
  const outW = cols * cellW + pad;
  const outH = rows * cellH + pad;

  const canvas = new OffscreenCanvas(outW, outH);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = cfg.bg;
  ctx.fillRect(0, 0, outW, outH);

  ctx.font = '10px -apple-system, sans-serif';
  ctx.textBaseline = 'top';

  for (let i = 0; i < files.length; i++) {
    const file = files[i].file ?? (files[i].handle ? await files[i].handle.getFile() : null);
    if (!file) continue;

    const row = Math.floor(i / cols);
    const col = i % cols;
    const x = pad + col * cellW;
    const y = pad + row * cellH;

    try {
      const bitmap = await createImageBitmap(file);
      // Cover-fit the thumb into thumbW × thumbH
      const sRatio = bitmap.width / bitmap.height;
      const tRatio = thumbW / thumbH;
      let sx = 0, sy = 0, sw = bitmap.width, sh = bitmap.height;
      if (sRatio > tRatio) {
        // wider source: crop horizontally
        sw = bitmap.height * tRatio;
        sx = (bitmap.width - sw) / 2;
      } else {
        sh = bitmap.width / tRatio;
        sy = (bitmap.height - sh) / 2;
      }
      ctx.drawImage(bitmap, sx, sy, sw, sh, x, y, thumbW, thumbH);
      bitmap.close?.();
    } catch {
      ctx.fillStyle = '#444';
      ctx.fillRect(x, y, thumbW, thumbH);
    }

    if (cfg.showLabels) {
      ctx.fillStyle = pickReadable(cfg.bg);
      const label = files[i].name.length > 32 ? files[i].name.slice(0, 30) + '…' : files[i].name;
      ctx.fillText(label, x + 4, y + thumbH + 4);
    }
    onProgress(i + 1, files.length);
  }

  return canvas.convertToBlob({
    type: cfg.sheetFormat === 'jpeg' ? 'image/jpeg' : 'image/png',
    quality: 0.9
  });
}

// ── Helpers ──────────────────────────────────────────────────────────────────

async function thumbToDataUrl(bitmap, maxSize, type, quality) {
  const scale = Math.min(maxSize / bitmap.width, maxSize / bitmap.height, 1);
  const w = Math.round(bitmap.width * scale);
  const h = Math.round(bitmap.height * scale);
  const c = new OffscreenCanvas(w, h);
  const ctx = c.getContext('2d');
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(bitmap, 0, 0, w, h);
  const blob = await c.convertToBlob({ type, quality });
  return blobToDataUrl(blob);
}

function blobToDataUrl(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('read failed'));
    r.readAsDataURL(blob);
  });
}

function pickReadable(bg) {
  // Pick black or white text depending on bg luminance
  const { r, g, b } = hexToRgb(bg);
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return lum > 0.55 ? '#111' : '#fafafa';
}
function pickSoft(bg) {
  const { r, g, b } = hexToRgb(bg);
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return lum > 0.55 ? 'rgba(0,0,0,.12)' : 'rgba(255,255,255,.12)';
}

  const s = hex.replace('#', '');
  const h = s.length === 3 ? s.split('').map(c => c + c).join('') : s;
  return { r: parseInt(h.slice(0, 2), 16), g: parseInt(h.slice(2, 4), 16), b: parseInt(h.slice(4, 6), 16) };

  const d = new Date(), p = n => String(n).padStart(2, '0');
  return String(d.getFullYear()).slice(-2) + p(d.getMonth()+1) + p(d.getDate()) + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
}

  const t = ((cwTurns % 4) + 4) % 4;
  const i = CW_NORMAL.indexOf(current);
  if (i !== -1) return CW_NORMAL[(i + t) % 4];
  const fi = CW_FLIPPED.indexOf(current);
  if (fi !== -1) return CW_FLIPPED[(fi + t) % 4];

// Returns a new Blob with the rotated orientation tag.
// cwTurns: 1 = 90° CW, 2 = 180°, 3 = 90° CCW
async function rotateJpegLossless(blob, cwTurns) {

  const view = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);
  if (view.getUint16(0) !== 0xFFD8) throw new Error('Not a JPEG (missing SOI marker)');

  // Walk APP0-APP15 segments looking for EXIF APP1
  let offset = 2;
  while (offset < buf.length - 2) {
    const marker = view.getUint16(offset);
    if (marker === 0xFFDA) break; // SOS — no more metadata
    if (marker < 0xFFE0 || marker > 0xFFEF) {
      // Not an APP marker; move past it if it has a length
      const segLen = view.getUint16(offset + 2);
      offset += 2 + segLen;
      continue;

    if (marker === 0xFFE1 &&
        view.getUint32(offset + 4) === 0x45786966 &&
        view.getUint16(offset + 8) === 0x0000) {
      // EXIF APP1 found — locate orientation tag (0x0112) in IFD0
      const tiffStart = offset + 10;

      if (byteOrder !== 0x4949 && byteOrder !== 0x4D4D) throw new Error('Invalid TIFF byte order');
      const le = byteOrder === 0x4949;

        const entryOff = ifd0Off + 2 + i * 12;
        if (view.getUint16(entryOff, le) === 0x0112) {

          const current = view.getUint16(entryOff + 8, le);

    const db = await getDb();
    return await new Promise((res) => {
      const tx = db.transaction(STORE, 'readonly');
      const req = tx.objectStore(STORE).get('current');
      req.onsuccess = () => res(req.result ?? null);
      req.onerror   = () => res(null);
    });
  } catch { return null; }

async function clearSession() {
  try {
    const db = await getDb();
    await new Promise((res) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete('current');
      tx.oncomplete = res; tx.onerror = res;

    if (meta && e.shiftKey && e.key === 'Z') { e.preventDefault(); emit('history:redo', null); return; }

    if (meta && e.key === 'v') { e.preventDefault(); openFromClipboard(); return; }

    // Zoom
    if (meta && (e.key === '=' || e.key === '+')) { e.preventDefault(); zoomStep(1); return; }
    if (meta && e.key === '-') { e.preventDefault(); zoomStep(-1); return; }
    if (meta && e.key === '0') { e.preventDefault(); fitToWindow(); return; }
    if (meta && e.key === '1') { e.preventDefault(); zoomTo(1); return; }

      setRulersVisible(newVal);

    // Tool keys
    if (e.key === 'c' || e.key === 'C') { emit('tool:activate', { tool: 'crop' }); return; }
    if (e.key === 'r' || e.key === 'R') { emit('tool:activate', { tool: 'redact' }); return; }
    if (e.key === 'b' || e.key === 'B') { emit('tool:activate', { tool: 'blur' }); return; }

      if (t === 'redact') { emit('op:redact', null); return; }

async function doSave(showDialog = false) {
  const { export: exp, image, session } = state;
  const entry = session.files[session.currentIndex];
  const baseName = entry?.name?.replace(/\.[^.]+$/, '') ?? 'image';

  // Encode
  const keepExif = !exp.stripExif && exp.format === 'jpeg';
  const exifRaw  = keepExif ? (image.exif?.raw ?? null) : null;

  // Flatten visible layers onto a copy of the working canvas before encode
  const flat = flattenLayers(image.working);

  let blob;

    if (exp.format === 'png') blob = await encodePng(flat);
    else if (exp.format === 'jpeg') blob = await encodeJpeg(flat, exp.quality, exifRaw);
    else blob = await encodeWebp(flat, exp.quality);
  } catch (err) {
    emit('error', { message: `Save failed: ${err.message}` });
    return;
  }

  const ext = exp.format === 'jpeg' ? 'jpg' : exp.format;
  const filename = `${baseName}-${tstamp()}.${ext}`;

  try {
    if (exp.saveMode === 'overwrite' && entry?.handle) {
      const confirmed = await confirmDialog('This replaces the original file. Undo history will be lost on next open.');
      if (!confirmed) return;
      await saveOverwrite(blob);
      emit('toast', { message: 'File overwritten.', level: 'ok' });
    } else if (exp.saveMode === 'sidecar' && session.folderHandle) {
      const saved = await saveSidecar(blob, ext);
      emit('toast', { message: `Saved as ${saved}`, level: 'ok' });
    } else {
      await saveDownload(blob, filename);
      emit('toast', { message: `Downloaded ${filename}`, level: 'ok' });
    }
    clearSession();
    emit('save:complete', null);
  } catch (err) {
    emit('error', { message: `Save failed: ${err.message}` });
  }
}

  mainArea.insertBefore(banner, mainArea.firstChild);

  document.getElementById('session-resume').addEventListener('click', async () => {
    banner.remove();
    // Register the replay listener BEFORE opening. openFromHandle emits
    // 'image:loaded' during its await; if we subscribed after, we'd miss it
    // and the ops would never replay.
    if (saved.ops.length) {
      once('image:loaded', async () => {
        try { await replayOps(saved.ops); }
        catch (err) { emit('error', { message: `Could not restore edits: ${err.message}` }); }
      });
    }
    try {
      if (saved.type === 'fsa') {
        await openFromHandle(saved.handle);
      } else {
        await openFromFile(saved.file);
      }
    } catch { /* error toast already shown */ }
  });

  document.getElementById('session-discard').addEventListener('click', () => {
    banner.remove();
    clearSession();
  });
}

async function confirmDialog(message) {
  return new Promise((resolve) => {
    let dialog = document.getElementById('dialog-confirm');
    if (!dialog) {
      dialog = document.createElement('dialog');
      dialog.id = 'dialog-confirm';
      dialog.innerHTML = `
        <div class="modal-header"><h2>Confirm</h2></div>
        <p id="confirm-msg"></p>
        <div class="modal-footer">
          <button class="btn" id="confirm-cancel">Cancel</button>
          <button class="btn btn-danger" id="confirm-ok">Confirm</button>
        </div>
      `;
      document.body.appendChild(dialog);
    }
    dialog.querySelector('#confirm-msg').textContent = message;
    dialog.querySelector('#confirm-cancel').onclick = () => { dialog.close(); resolve(false); };
    dialog.querySelector('#confirm-ok').onclick = () => { dialog.close(); resolve(true); };
    dialog.showModal();
  });
}

// ── Smart save ────────────────────────────────────────────────────────────────

async function smartSave() {
  if (!state.image.working) return;
  const { session } = state;
  const entry = session.files[session.currentIndex];

  if (session.folderHandle) {
    // Workspace folder set → sidecar save directly, no dialog
    state.export.saveMode = 'sidecar';
    await doSave(false);
  } else if (entry?.handle) {
    // Opened via FSA file picker → overwrite
    state.export.saveMode = 'overwrite';
    await doSave(false);
  } else {
    // No known target → open export modal so user can choose
    emit('modal:export', null);
  }
}

// ── Workspace nudge ───────────────────────────────────────────────────────────

function setupWorkspaceNudge() {
  const NON_FSA = new Set(['picker', 'dragdrop', 'paste']);
  on('image:loaded', () => {
    document.getElementById('workspace-nudge')?.remove();
    if (!NON_FSA.has(state.session.source)) return;
    if (state.session.folderHandle) return;
    showWorkspaceNudge();
  });
}

function showWorkspaceNudge() {
  if (document.getElementById('workspace-nudge')) return;

  const nudge = document.createElement('div');
  nudge.id = 'workspace-nudge';
  nudge.className = 'workspace-nudge';
  nudge.setAttribute('role', 'status');

  if (hasDirPicker) {
    nudge.innerHTML = `
      <svg class="icon icon-sm" aria-hidden="true"><use href="#icon-folder"/></svg>
      <span>Pick a save folder to preserve your work across sessions.</span>
      <button class="btn btn-primary" id="workspace-nudge-pick" style="font-size:12px;padding:2px 10px;margin-left:4px">Choose Folder</button>
      <button class="workspace-nudge-close" aria-label="Dismiss">
        <svg class="icon icon-sm" aria-hidden="true"><use href="#icon-x"/></svg>
      </button>
    `;
    nudge.querySelector('#workspace-nudge-pick').addEventListener('click', async () => {
      try {
        const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        state.session.folderHandle = dirHandle;
        nudge.remove();
        emit('toast', { message: 'Save folder set — Ctrl+S will save here.', level: 'ok' });
      } catch (err) {
        if (err.name !== 'AbortError') emit('error', { message: `Could not set folder: ${err.message}` });
      }
    });
  } else {
    nudge.innerHTML = `
      <svg class="icon icon-sm" aria-hidden="true"><use href="#icon-info"/></svg>
      <span>Use Chrome on desktop to enable folder save and session restore.</span>
      <button class="workspace-nudge-close" aria-label="Dismiss">
        <svg class="icon icon-sm" aria-hidden="true"><use href="#icon-x"/></svg>
      </button>
    `;
  }

  nudge.querySelector('.workspace-nudge-close').addEventListener('click', () => nudge.remove());
  document.getElementById('app')?.appendChild(nudge);
}

// ── Start ─────────────────────────────────────────────────────────────────────

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

return {  };
})();
</script>
